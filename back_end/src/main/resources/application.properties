spring.application.name=sistema.gerenciador.tg
server.port=${SERVER_PORT}

# Configuracoes de banco de dados.
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT}\
  /gerenciador_tg_database?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# Configuracao do JWT:
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION_MS}

# Configuracao do CORS
api.cors.origins=${CORS_ORIGINS}

# Configuracao do SMTP:
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${SMTP_FROM:sistema.gen.tg@cps.fateczl.com}

# Diretorio dos arquivos tg
file.upload.dir=${FILE_UPLOAD_DIR}

# Limite maximo de tamanho de um unico arquivo
spring.servlet.multipart.max-file-size=20MB

# Limite maximo da requisicao toda (arquivo e outros dados do form)
spring.servlet.multipart.max-request-size=25MB